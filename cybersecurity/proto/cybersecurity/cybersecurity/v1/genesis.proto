syntax = "proto3";
package cybersecurity.cybersecurity.v1;

import "amino/amino.proto";
import "cybersecurity/cybersecurity/v1/params.proto";
import "gogoproto/gogo.proto";

option go_package = "cybersecurity/x/cybersecurity/types";

// GenesisState defines the cybersecurity module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
