syntax = "proto3";
package cybersecurity.cybersecurity.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "cybersecurity/x/cybersecurity/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "cybersecurity/x/cybersecurity/Params";
  option (gogoproto.equal) = true;
}
